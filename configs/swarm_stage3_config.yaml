  venv_path: "~/sweep_env/bin/activate"
  git_branch: "stage3_hp-tuning" # The specific branch the manager will pull
  worker_script: "training/swarm_worker_stage3.py"
  log_directory: "/tmp/swarm_logs"
  
  # Storage Quota Safety
  hf_cache_dir: "/tmp/hf_cache"
  torch_cache_dir: "/tmp/torch_cache"
  scratch_dir: "/tmp/denassau_stage3"
