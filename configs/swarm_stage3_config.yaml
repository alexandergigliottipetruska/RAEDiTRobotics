# ---------------------------------------------------------------------------
# FIXED VARIABLES (passed to V3Config via setattr)
# ---------------------------------------------------------------------------
training_static:
  # Paths (~ expands to the user's home dir at runtime)
  stage1_checkpoint: "~/RAEDiTRobotics/checkpoints/stage1_full_rtx5090_0312_0400/epoch_024.pt"
  hdf5_paths:
    - "~/data/robomimic/square/ph_abs_v15_tokens_bf16_none.hdf5"
  eval_hdf5: "~/data/robomimic/square/ph_abs_v15.hdf5"

  # Task
  eval_task: "square"
  eval_mode: "robomimic"
  eval_exec_horizon: 8

  # Eval schedule: full 50-episode eval every 10 epochs for Optuna signal
  eval_every_epoch: 10000       # disable quick eval
  eval_full_every_epoch: 10     # full eval every 10 epochs
  eval_full_episodes: 50
  eval_n_envs: 10               # conservative for shared machines
  eval_image_size: 84

  # Architecture (fixed)
  ac_dim: 10
  proprio_dim: 9
  num_views: 4
  n_active_cams: 2
  T_obs: 2
  T_pred: 10
  T_act: 8
  pad_before: 1
  pad_after: 7
  denoiser_type: "transformer"
  spatial_pool_size: 7
  use_flow_matching: true

  # Training
  batch_size: 64
  num_epochs: 300               # cosine LR hits 0 by epoch 299
  warmup_steps: 1000
  lr_schedule: "cosine"
  norm_mode: "chi"
  use_rot6d: true
  cache_in_ram: true

  # Precision
  no_amp: true                  # fp32 compute (Chi's approach)
  no_compile: true              # avoid compilation overhead per trial

  # Checkpointing (minimize disk usage — 65 GB quota)
  save_every_epoch: 0           # no permanent milestones
  save_rolling_every: 50        # single rolling checkpoint for crash recovery
  no_save_best: true            # skip best.pt (val loss)
  no_save_best_success: false   # keep best_success.pt

  # Val split
  val_ratio: 0.02
  val_seed: 42


# ---------------------------------------------------------------------------
# DYNAMIC VARIABLES (Optuna Search Space)
# ---------------------------------------------------------------------------
hyperparameters_search:
  lr:
    method: "suggest_float"
    kwargs:
      low: 5.0e-5
      high: 5.0e-4
      log: true

  lr_adapter:
    method: "suggest_float"
    kwargs:
      low: 1.0e-6
      high: 1.0e-4
      log: true

  d_model:
    method: "suggest_categorical"
    kwargs:
      choices: [256, 384, 512]

  n_layers:
    method: "suggest_int"
    kwargs:
      low: 6
      high: 12
      step: 2

  n_cond_layers:
    method: "suggest_int"
    kwargs:
      low: 2
      high: 6
      step: 2

  p_drop_attn:
    method: "suggest_float"
    kwargs:
      low: 0.0
      high: 0.3
