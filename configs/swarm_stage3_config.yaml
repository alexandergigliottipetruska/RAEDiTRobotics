  # eval_video_episodes: 1
  # eval_video_steps: 100
  # eval_video_dir: "/tmp/eval_videos" # Keep it in /tmp to avoid quota issues
  
  # Optuna Pruning Settings
  n_startup_trials: 10
  n_warmup_steps: 400     # Don't prune any trial before epoch 500 (warmup phase)
  pruning_percentile: 25.0   # Prune if in the worst 25% of trials
  n_trials_per_worker: 5

