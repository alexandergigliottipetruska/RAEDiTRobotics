# Distributed Optuna HP sweep for Stage 3 — Round 3d (narrow + lr_schedule probe)
# Metric: 0.3*peak + 0.7*last_6_avg, PercentilePruner(50%)=MedianPruner, 50-epoch rapid sweep.
#
# R3d extends R3c's narrow search by adding `lr_schedule ∈ {cosine, constant}` as a HP.
# This tests whether R3b's 50-epoch cosine proxy systematically under-rewards HPs that
# need more effective lr×steps to converge. Constant-lr (with warmup) gives ~2× more
# effective learning budget than cosine for the same peak lr.
#
# Search space: nl ∈ {6, 8} × lr_schedule ∈ {cosine, constant} = 4 categorical cells.
# n_trials_per_worker bumped from 5 to 7 (was R3c) to keep ~20 completed samples per cell
# after MedianPruner (24 × 7 = 168 → ~84 complete → ~21/cell).
#
# R3b top-10 (reference): lr gmedian=3.78e-4, lr_a gmedian=2.32e-6, pdrop median=0.226,
# all nl=8; champion #160 at lr=4.23e-4, lr_a=2.26e-6, pdrop=0.240, weighted=0.9662.
#
# CRITICAL PRUNER SEMANTICS NOTE (learned the hard way in R3b):
# Optuna's PercentilePruner for a MAXIMIZATION study internally does `percentile = 100 - percentile`.
# So `PercentilePruner(percentile=25.0)` does NOT "kill bottom 25%". It keeps ONLY the top 25%.
# R3d uses 50.0 = MedianPruner semantics = keep top 50%, kill bottom 50% (less aggressive).
# Usage: python training/swarm_manager_stage3.py start|stop|status|restart_idle

project:
  study_name: "v3_square_bf16_hp_sweep_r3d"
  domain: "utm.utoronto.ca"
  project_root: "~/RAEDiTRobotics"
  venv_path: "~/venv_rlbench/bin/activate"
  worker_script: "training/swarm_worker_v3.py"
  log_directory: "/tmp/swarm_logs"

  # Storage Quota Safety (redirect caches to local /tmp, not NFS)
  hf_cache_dir: "/tmp/hf_cache"
  torch_cache_dir: "/tmp/torch_cache"
  scratch_dir: "/tmp/optuna_trials"
  hf_repo_id: "swagman8008/RAE-DP-stage3-sweeps"

  # Optuna Settings — MedianPruner, bumped trials for 4 categorical cells
  n_startup_trials: 10
  n_warmup_steps: 19          # allow ~4 evals before pruning (evals at 4, 9, 14, 19, ...)
  pruning_percentile: 50.0    # MedianPruner semantics: keep top 50%, kill bottom 50%
  n_trials_per_worker: 7      # 24 workers × 7 trials = 168 (up from R3c's 5 to compensate for 2× cells)

manager:
  # SSH auth: set ssh_password in configs/secrets.yaml, or use SSH keys
  # sshpass_path: "/path/to/sshpass"  # uncomment if using sshpass

