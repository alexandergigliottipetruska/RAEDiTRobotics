# ---------------------------------------------------------------------------
# FIXED VARIABLES (passed to V3Config via setattr)
# ---------------------------------------------------------------------------
training_static:
  # Paths (~ expands to the user's home dir at runtime)
  stage1_checkpoint: "~/RAEDiTRobotics/checkpoints/stage1_full_rtx5090_0312_0400/epoch_024.pt"
  hdf5_paths:
    - "~/data/robomimic/square/ph_abs_v15_tokens_bf16_none.hdf5"
  eval_hdf5: "~/data/robomimic/square/ph_abs_v15.hdf5"

  # Task
  eval_task: "square"
  eval_mode: "robomimic"
  eval_exec_horizon: 8

  # Eval: 100 episodes, 15 envs, every 5 epochs (10 evals per trial)
  eval_every_epoch: 10000       # disable quick eval
  eval_full_every_epoch: 5      # full eval every 5 epochs
  eval_full_episodes: 100
  eval_n_envs: 15
  eval_image_size: 84

  # Architecture (locked from R1+R2 findings)
  ac_dim: 10
  proprio_dim: 9
  num_views: 4
  n_active_cams: 2
  T_obs: 2                      # locked: best in R2
  T_pred: 10
  T_act: 8
  pad_before: 1
  pad_after: 7
  denoiser_type: "transformer"
  spatial_pool_size: 7
  d_model: 384                  # locked: dominates all top trials
  n_head: 6                     # paired with d=384
  n_cond_layers: 4              # locked: best in R1 d=384 breakdown
  use_flow_matching: true

  # Training — rapid 50-epoch runs
  # NOTE: lr_schedule moved to hyperparameters_search below (R3d adds it as a HP)
  batch_size: 64
  num_epochs: 50                # rapid sweep: ~50 min per trial at d=384
  warmup_steps: 1000            # ~1-2 epochs of warmup
  norm_mode: "chi"
  use_rot6d: true
  cache_in_ram: true

  # Precision
  no_amp: true                  # fp32 compute (Chi's approach)
  no_compile: true              # avoid compilation overhead per trial

  # Checkpointing (minimize disk usage — 65 GB quota)
  save_every_epoch: 0           # no permanent milestones
  save_rolling_every: 25        # rolling backup mid-run
  no_save_best: true            # skip best.pt (val loss)
  no_save_best_success: false   # keep best_success.pt

  # Val split
  val_ratio: 0.02
  val_seed: 42


# ---------------------------------------------------------------------------
# DYNAMIC VARIABLES (Optuna Search Space — Round 3d, narrow + lr_schedule probe)
# Same narrow search as R3c (R3b's top-10 basin) but adds `lr_schedule` as a HP
# to test whether the 50-epoch cosine proxy is under-rewarding HPs that need
# more effective-lr time to converge. Constant-lr (with warmup) gives every HP
# ~2× more effective lr×steps than cosine for the same peak lr, so the optimal
# peak lr is expected to shift lower for constant-schedule trials.
# R3b top-10: lr gmedian=3.78e-4, lr_a gmedian=2.32e-6, pdrop median=0.226, all nl=8.
# ---------------------------------------------------------------------------
hyperparameters_search:
  lr:
    method: "suggest_float"
    kwargs:
      low: 2.0e-4          # R3b top-10 interquartile [2.83e-4, 4.23e-4], ~1.5× margin below
      high: 6.0e-4         # ~1.5× margin above top of interquartile
      log: true

  lr_adapter:
    method: "suggest_float"
    kwargs:
      low: 5.0e-7          # R3b top-10 interquartile [1.77e-6, 2.65e-6], ~3× margin below
      high: 1.0e-5         # ~4× margin above — probes the "frozen vs mild" boundary
      log: true

  n_layers:
    method: "suggest_categorical"
    kwargs:
      choices: [6, 8]      # dropped nl=4 (clearly worse in R3b: avg 0.831 vs 0.921 for nl=8)

  p_drop_attn:
    method: "suggest_float"
    kwargs:
      low: 0.15            # R3b top-10 interquartile [0.194, 0.240]
      high: 0.26

  lr_schedule:
    method: "suggest_categorical"
    kwargs:
      choices: ["cosine", "constant"]   # R3d probe: is 50-epoch cosine decaying too early?
