# ---------------------------------------------------------------------------
# FIXED VARIABLES (Passed directly to Stage3Config)
# ---------------------------------------------------------------------------
training_static:
  # UPDATE THESE PATHS to point to your actual Phase 1 weights & tokens!
  stage1_checkpoint: "/student/denassau/CSC415/Project/RAEDiTRobotics/data/stage1_checkpoints/epoch_024.pt" 
  hdf5_paths: # precomputed tokens
    - "/student/denassau/CSC415/Project/RAEDiTRobotics/data/stage3_decompressed_tokens/lift_tokens_fast.hdf5"
    
  # Hardware & Horizon Locks
  batch_size: 36
  num_workers: 10
  norm_mode: "minmax"
  ac_dim: 7
  proprio_dim: 9
  num_views: 4
  T_obs: 2
  T_pred: 16
  T_act: 8
  hidden_dim: 512
  p: 0.0
  
  # Policy & Diffusion Formulation (Locked to Flow Matching by default)
  train_diffusion_steps: 100
  eval_diffusion_steps: 10
  fm_timestep_dist: "beta"
  fm_timestep_scale: 1000.0
  fm_beta_a: 1.5
  fm_beta_b: 1.0
  fm_cutoff: 0.999
  num_flow_steps: 10

  lambda_recon: 0
  
  # Training Schedule Locks
  num_epochs: 1000
  grad_clip: 1.0
  warmup_steps: 400
  lr_schedule: "cosine"
  use_lightning: true
  save_every_epoch: 100     
  eval_video_task: ""      

# ---------------------------------------------------------------------------
# DYNAMIC VARIABLES (Optuna Search Space - 9 Variables)
# ---------------------------------------------------------------------------
hyperparameters_search:
  policy_type:
    method: "suggest_categorical"
    kwargs:
      choices: ["ddpm"]

  # 1. Learning Rates
  lr:
    method: "suggest_float"
    kwargs:
      low: 1.0e-5
      high: 5.0e-4
      log: true
  # lr_adapter:
  #   method: "suggest_float"
  #   kwargs:
  #     low: 1.0e-6
  #     high: 1.0e-4
  #     log: true

  # 2. DiT Architecture (Capacity vs Overfitting)
  num_blocks:
    method: "suggest_int"
    kwargs:
      low: 4
      high: 8
  nhead:
    method: "suggest_categorical"
    kwargs:
      choices: [4, 8]

  weight_decay:
    method: "suggest_float"
    kwargs:
      low: 1.0e-5
      high: 1.0e-3
      log: true
      
  # 4. Diffusion Weights Moving Average
  ema_decay:
    method: "suggest_categorical"
    kwargs:
      choices: [0.99, 0.999, 0.9999]  # Crucial for smoothing robotic actions